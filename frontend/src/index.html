<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TFT HUD</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: transparent;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #f0f0f0;
        overflow: hidden;
      }
      #app {
        background: rgba(20, 20, 30, 0.9);
        border-radius: 8px;
        padding: 16px;
        min-height: 100vh;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        -webkit-app-region: drag;
      }
      .title {
        font-size: 18px;
        font-weight: 600;
        color: #e6c200;
      }
      .badge {
        background: rgba(230, 194, 0, 0.2);
        color: #e6c200;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
      }
      .section {
        margin-bottom: 16px;
      }
      .section-title {
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
        opacity: 0.7;
      }
      .comp-card {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 8px;
      }
      .comp-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .comp-name {
        font-weight: 500;
      }
      .tier-badge {
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }
      .tier-s {
        background: #e6c200;
        color: #000;
      }
      .tier-a {
        background: #22c55e;
        color: #000;
      }
      .tier-b {
        background: #3b82f6;
        color: #fff;
      }
      .tier-c {
        background: #6b7280;
        color: #fff;
      }
      .comp-stats {
        display: flex;
        gap: 16px;
        font-size: 12px;
        opacity: 0.7;
      }
      .phase-guide {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        padding: 12px;
      }
      .phase-label {
        font-size: 11px;
        text-transform: uppercase;
        opacity: 0.5;
        margin-bottom: 4px;
      }
      .phase-action {
        font-size: 14px;
        font-weight: 500;
      }
      .items-grid {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .item {
        background: rgba(255, 255, 255, 0.1);
        padding: 8px;
        border-radius: 4px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="header">
        <div class="title">TFT HUD</div>
        <div class="badge">Patch 14</div>
      </div>
      <div class="status">
        <div class="dot"></div>
        <span>Connected</span>
      </div>

      <div class="section">
        <div class="section-title">Current Phase: Early Game</div>
        <div class="phase-guide">
          <div class="phase-label">Round 2-1</div>
          <div class="phase-action">Focus on economy</div>
          <div class="phase-sub">Target: 50g by Krugs</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Top Comps</div>
        <div class="comp-card">
          <div class="comp-header">
            <span class="comp-name">Hellfire Burn</span>
            <span class="tier-badge tier-s">S</span>
          </div>
          <div class="comp-stats">
            <span>WR: 52%</span>
            <span>T4: 78%</span>
            <span>Avg: 3.8</span>
          </div>
        </div>
        <div class="comp-card">
          <div class="comp-header">
            <span class="comp-name">Aegis Enforcers</span>
            <span class="tier-badge tier-a">A</span>
          </div>
          <div class="comp-stats">
            <span>WR: 48%</span>
            <span>T4: 72%</span>
            <span>Avg: 4.2</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Items to Build</div>
        <div class="items-grid">
          <div class="item">Rabadon</div>
          <div class="item">HoJ</div>
          <div class="item">BT</div>
        </div>
      </div>
    </div>
  </body>
</html>
